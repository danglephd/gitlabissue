<div class="video-player-dialog">
  <!-- Header -->
  <div class="dialog-header">
    <div class="header-content">
      <h2 mat-dialog-title class="video-title" [title]="data.song.title">{{ data.song.title }}</h2>
      <p class="video-channel" [title]="data.song.channel">{{ data.song.channel }}</p>
    </div>
    <button mat-icon-button (click)="closeDialog()" class="close-button" aria-label="Close video player" title="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Video Player Container -->
  <div class="video-container">
    <!-- YouTube Player will be inserted here by API -->
    <div #youtubePlayerContainer class="youtube-player-embed" id="youtube-player-container"></div>
    
    <!-- Loading state -->
    <div *ngIf="isLoadingVideo" class="loading-overlay">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
  </div>
</div>
