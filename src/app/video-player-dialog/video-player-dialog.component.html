<div class="video-player-dialog">
  <!-- Header -->
  <div class="dialog-header">
    <div class="header-content">
      <h2 mat-dialog-title class="video-title" [title]="data.title">{{ data.title }}</h2>
      <p class="video-channel" [title]="data.channel">{{ data.channel }}</p>
    </div>
    <button mat-icon-button (click)="closeDialog()" class="close-button" aria-label="Close video player">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Video Player Container -->
  <div class="video-container">
    <iframe
      *ngIf="videoUrl"
      class="video-player"
      [src]="videoUrl"
      title="{{ data.title }}"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
    <!-- Loading state -->
    <div *ngIf="!videoUrl" class="loading-spinner">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
  </div>
</div>
